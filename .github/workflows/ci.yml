name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # No pyproject: runtime + test deps are pinned in requirements.txt.
      # Tests are hermetic (hand-computed pure functions) — no ENTSO-E calls,
      # no tokens, no local data. Raw-data fetch (entsoe-py) is runtime-only.
      - run: pip install -r requirements.txt
      - run: pytest -m "not network" -q
